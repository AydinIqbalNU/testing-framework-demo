name: PR - Build / Test

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake lcov

      - name: Configure CMake (with coverage)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="--coverage" -DCMAKE_C_FLAGS="--coverage"

      - name: Build
        run: cmake --build build --config Debug

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-results
          path: build/Testing

      - name: Show test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          ctest --test-dir build --output-on-failure >> $GITHUB_STEP_SUMMARY

      - name: Generate coverage report
        run: |
          lcov --rc geninfo_unexecuted_blocks=1 --ignore-errors mismatch --capture --directory build --output-file coverage.info
          lcov --rc geninfo_unexecuted_blocks=1 --ignore-errors mismatch --remove coverage.info '/usr/*' '*/tests/*' '*/_deps/*' --output-file coverage.info
          genhtml coverage.info --output-directory coverage

      - name: Install matplotlib
        run: pip install matplotlib

      - name: Generate coverage chart
        run: |
          python3 << 'EOF'
          import matplotlib.pyplot as plt
          import re

          # Parse coverage.info to extract covered + total lines
          covered = 0
          total = 0
          with open("coverage.info") as f:
              for line in f:
                  if line.startswith("LF:"):
                      total += int(line.split(":")[1])
                  if line.startswith("LH:"):
                      covered += int(line.split(":")[1])

          labels = ['Covered', 'Not Covered']
          sizes = [covered, total - covered]
          colors = ['#4CAF50', '#F44336']

          plt.figure(figsize=(4,4))
          plt.pie(sizes, labels=labels, colors=colors, autopct='%1.1f%%')
          plt.title('Code Coverage')
          plt.savefig('coverage-chart.png')
          EOF

      - name: Add coverage chart to summary
        run: |
          echo "## 📊 Coverage Chart" >> $GITHUB_STEP_SUMMARY
          echo "![](coverage-chart.png)" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: Show coverage summary
        run: |
          echo "## Code Coverage" >> $GITHUB_STEP_SUMMARY
          lcov --summary coverage.info >> $GITHUB_STEP_SUMMARY
