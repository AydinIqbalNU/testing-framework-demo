name: PR - Build / Test

# triggers the workflow to run on pull request or manually.
# DESIGN CHOICES: could add daily auto trigger, 
# trigger on github release, trigger on issue open, etc.
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

# do not give actions write permissions
permissions:
  actions: read
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest # run job on ubuntu linux compiler

    steps:

      # pulls repo to be built by workflow
      - name: Checkout code
        uses: actions/checkout@v4

      # install compilers, build system, coverage tool, and python
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake lcov python3

      # configure project into a build directory, 
      # set to debug mode, and set coverage flags
      - name: Configure CMake (with coverage)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="--coverage" -DCMAKE_C_FLAGS="--coverage"

      # compile library and tests
      - name: Build
        run: cmake --build build --config Debug

      # runs all tests registered by add_test()
      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      # report which tests failed and what lines 
      # DESIGN CHOICE: extract failing test names for per-test coverage
      - name: Extract failing tests
        if: failure()
        run: |
          echo "## ❌ Failed Tests" >> $GITHUB_STEP_SUMMARY
          ctest --test-dir build --output-on-failure > full_test_output.txt

          # extract test names like "AdditionTest.FailureExample"
          grep -Eo "

          \[  FAILED  \]
          
           [A-Za-z0-9_\.]+" full_test_output.txt | awk '{print $3}' > failing_tests.txt

          # show raw failure lines in summary
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E "FAILED|Failure|error:" full_test_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # run each failing test individually and capture coverage
      # DESIGN CHOICE: enables mapping failing tests → executed source lines
      - name: Capture per-test coverage
        if: failure()
        run: |
          mkdir per_test_coverage

          while read testname; do
            echo "Running failing test: $testname"

            # reset coverage counters
            lcov --directory build --zerocounters

            # run only this test
            ctest --test-dir build -R "$testname" --output-on-failure

            # capture coverage for this test
            lcov --capture --directory build --output-file "per_test_coverage/$testname.info"

          done < failing_tests.txt

      # add executed harp.cpp lines to summary
      # DESIGN CHOICE: shows which source lines ran during failing tests
      - name: Add executed lines to failure report
        if: failure()
        run: |
          python3 << 'EOF'
          import os, re

          print("## 🔍 Executed Source Lines for Failing Tests\n")

          # load failing test names
          with open("failing_tests.txt") as f:
              tests = [t.strip() for t in f]

          for test in tests:
              print(f"### {test}")
              info_file = f"per_test_coverage/{test}.info"

              if not os.path.exists(info_file):
                  print("  (no coverage data found)\n")
                  continue

              executed = []
              current_file = None

              with open(info_file) as f:
                  for line in f:
                      if line.startswith("SF:"):
                          current_file = line.split("SF:")[1].strip()
                      if line.startswith("DA:"):
                          lineno, hits = line.split("DA:")[1].split(",")
                          if int(hits) > 0 and "harp.cpp" in current_file:
                              executed.append(f"{current_file}:{lineno}")

              if executed:
                  print("  executed lines in harp.cpp:")
                  for e in executed:
                      print(f"  - {e}")
              else:
                  print("  no harp.cpp lines executed.")

              print()
          EOF >> $GITHUB_STEP_SUMMARY

      # uploads ctest result as an artifact to be downloaded.
      # runs even on test failure.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-results
          path: build/Testing

      # write test results into summary UI
      - name: Show test summary
        if: always()
        run: |
          echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          ctest --test-dir build --output-on-failure >> $GITHUB_STEP_SUMMARY

      # capture coverage, filter noise, generate html report
      - name: Generate coverage report
        run: |
          lcov --rc geninfo_unexecuted_blocks=1 --ignore-errors mismatch --capture --directory build --output-file coverage.info
          lcov --rc geninfo_unexecuted_blocks=1 --ignore-errors mismatch --remove coverage.info '/usr/*' '*/tests/*' '*/_deps/*' --output-file coverage.info
          genhtml coverage.info --output-directory coverage

      # update html coverage dashboard
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage

      # AI-generated markdown test summary
      # parse coverage.info to compute coverage %. 
      # writes .md file containing percentage & progress bars
      - name: Generate Markdown Coverage Dashboard
        run: |
          python3 << 'EOF'
          import re

          covered = 0
          total = 0
          with open("coverage.info") as f:
              for line in f:
                  if line.startswith("LF:"):
                      total += int(line.split(":")[1])
                  if line.startswith("LH:"):
                      covered += int(line.split(":")[1])

          pct = int(covered / total * 100) if total > 0 else 0
          bar_len = 40
          filled = int(bar_len * pct / 100)
          bar = "█" * filled + "░" * (bar_len - filled)

          with open("coverage-dashboard.md", "w") as out:
              out.write("# 📈 Build Quality Dashboard\n\n")
              out.write("## 🧪 Tests\n")
              out.write("- Status: 🟢 All tests passed\n\n")
              out.write("## 📊 Coverage\n")
              out.write(f"**Lines:** {pct}%\n")
              out.write(bar + "\n\n")
              out.write("_Dashboard generated automatically._\n")
          EOF

      # put .md dashboard into actions summary
      - name: Add Dashboard to Summary
        run: cat coverage-dashboard.md >> $GITHUB_STEP_SUMMARY
