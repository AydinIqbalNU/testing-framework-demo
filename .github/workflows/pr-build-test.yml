name: PR - Build / Test

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake lcov python3

      - name: Configure CMake (with coverage)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="--coverage" -DCMAKE_C_FLAGS="--coverage"

      - name: Build
        run: cmake --build build --config Debug

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-results
          path: build/Testing

      - name: Show test summary
        if: always()
        run: |
          echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          ctest --test-dir build --output-on-failure >> $GITHUB_STEP_SUMMARY

      - name: Generate coverage report
        run: |
          lcov --rc geninfo_unexecuted_blocks=1 --ignore-errors mismatch --capture --directory build --output-file coverage.info
          lcov --rc geninfo_unexecuted_blocks=1 --ignore-errors mismatch --remove coverage.info '/usr/*' '*/tests/*' '*/_deps/*' --output-file coverage.info
          genhtml coverage.info --output-directory coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: Generate Markdown Coverage Dashboard
        run: |
          python3 << 'EOF'
          import re

          covered = 0
          total = 0
          with open("coverage.info") as f:
              for line in f:
                  if line.startswith("LF:"):
                      total += int(line.split(":")[1])
                  if line.startswith("LH:"):
                      covered += int(line.split(":")[1])

          pct = int(covered / total * 100) if total > 0 else 0
          bar_len = 40
          filled = int(bar_len * pct / 100)
          bar = "█" * filled + "░" * (bar_len - filled)

          with open("coverage-dashboard.md", "w") as out:
              out.write("# 📈 Build Quality Dashboard\n\n")
              out.write("## 🧪 Tests\n")
              out.write("- Status: 🟢 All tests passed\n\n")
              out.write("## 📊 Coverage\n")
              out.write(f"**Lines:** {pct}%\n")
              out.write(bar + "\n\n")
              out.write("_Dashboard generated automatically._\n")
          EOF

      - name: Add Dashboard to Summary
        run: cat coverage-dashboard.md >> $GITHUB_STEP_SUMMARY
